<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBS Music TV - Player</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:Arial,Helvetica,sans-serif}
video{position:fixed;inset:0;width:100%;height:100%;object-fit:contain;background:#000}
#musicVideo{z-index:1}
#adVideo{z-index:3;display:none}
#badge{position:fixed;top:24px;left:24px;z-index:8;display:none;background:#ffcc00;color:#111;padding:10px 18px;border-radius:999px;font-weight:bold}
#ticker{position:fixed;bottom:0;left:0;right:0;height:46px;z-index:9;display:none;align-items:center;overflow:hidden;background:#ffcc00;color:#111;font-size:18px;font-weight:bold}
#ticker span{white-space:nowrap;padding-left:100%;animation:move 18s linear infinite}
@keyframes move{to{transform:translateX(-100%)}}
#black{position:fixed;inset:0;background:#000;z-index:20}
#black.hidden{display:none}
</style>
</head>
<body>
<video id="musicVideo" playsinline preload="auto"></video>
<video id="adVideo" playsinline preload="auto"></video>
<div id="badge">PUBLICIDAD</div>
<div id="ticker"><span id="tickerText"></span></div>
<div id="black"></div>
<script>
const CONFIG_URL='config.json';
const CHANNEL='obs_music_tv_github_channel_v1';
let bc=null;try{bc=new BroadcastChannel(CHANNEL)}catch(e){}
const mv=document.getElementById('musicVideo');
const av=document.getElementById('adVideo');
const badge=document.getElementById('badge');
const ticker=document.getElementById('ticker');
const tickerText=document.getElementById('tickerText');
const black=document.getElementById('black');
let config={},music=[],ads=[],mi=0,ai=0,repeat=true,random=false,autoplay=true,audio=false,playing=false,isAd=false,timer=null,minutes=5;
function abs(src){return new URL(src,location.href).href}
function post(x={}){if(bc)bc.postMessage({type:'status',mode:isAd?'ads':'music',playing,musicIndex:mi,adIndex:ai,musicCount:music.length,adCount:ads.length,currentMusic:music[mi]?.title||'',currentAd:ads[ai]?.title||'',...x})}
async function loadConfig(){try{const r=await fetch(CONFIG_URL+'?t='+Date.now(),{cache:'no-store'});config=await r.json();const s=config.settings||{};music=(config.music||[]).map((x,i)=>({title:x.title||'Música '+(i+1),src:abs(x.src)}));ads=(config.ads||[]).map((x,i)=>({title:x.title||'Anuncio '+(i+1),src:abs(x.src)}));repeat=s.repeat!==false;random=!!s.random;autoplay=s.autoplay!==false;minutes=Number(s.adIntervalMinutes)||5;mv.style.objectFit=s.videoFit||'contain';av.style.objectFit=s.videoFit||'contain';tickerText.textContent=s.tickerText||'';ticker.style.display=s.showTicker?'flex':'none';startTimer();if(music.length&&autoplay)playMusic(0);post({loaded:true})}catch(e){post({error:'No se pudo cargar config.json'})}}
function tryPlay(v){v.muted=!audio;v.play().then(()=>{black.classList.add('hidden');playing=true;post({playing,muted:v.muted})}).catch(()=>{playing=false;post({error:'Autoplay bloqueado. Presiona Activar audio desde admin.'})})}
function unlock(){audio=true;mv.muted=false;av.muted=false;black.classList.add('hidden');let v=isAd?av:mv;if(v.src)v.play().catch(()=>{});playing=true;post({audio:true,playing})}
function playMusic(i){if(!music[i])return;isAd=false;mi=i;av.pause();av.removeAttribute('src');av.load();av.style.display='none';badge.style.display='none';mv.style.display='block';mv.src=music[i].src;mv.load();mv.onloadedmetadata=()=>{if(autoplay)tryPlay(mv)};post({currentMusic:music[i].title})}
function nextIndex(){if(!music.length)return-1;if(random&&music.length>1){let n;do{n=Math.floor(Math.random()*music.length)}while(n===mi);return n}if(mi<music.length-1)return mi+1;if(repeat)return 0;return-1}
function nextMusic(){let n=nextIndex();if(n<0){mv.pause();playing=false;post({finished:true});return}playMusic(n)}
function startAds(reason='timer'){if(!ads.length||isAd)return;isAd=true;ai=0;mv.pause();mv.style.display='none';av.style.display='block';badge.style.display=(config.settings&&config.settings.showAdBadge===false)?'none':'block';post({adStarted:true,reason});playAd(reason)}
function playAd(reason='timer'){if(!isAd)return;if(ai>=ads.length){finishAds();return}av.src=ads[ai].src;av.load();av.onloadedmetadata=()=>{if(autoplay)tryPlay(av)};av.onended=()=>{ai++;playAd(reason)};post({currentAd:ads[ai].title,adIndex:ai})}
function finishAds(){isAd=false;av.pause();av.removeAttribute('src');av.load();av.style.display='none';badge.style.display='none';mv.style.display='block';if(mv.src&&autoplay)tryPlay(mv);else if(music.length)playMusic(mi);post({adFinished:true})}
function startTimer(){stopTimer();if(!minutes||minutes<1)return;timer=setInterval(()=>{if(!isAd&&music.length&&ads.length)startAds('timer')},minutes*60000);post({timerStarted:true})}
function stopTimer(){if(timer)clearInterval(timer);timer=null}
mv.addEventListener('ended',nextMusic);
mv.addEventListener('error',()=>{post({error:'Error cargando música: '+music[mi]?.src});nextMusic()});
av.addEventListener('error',()=>{post({error:'Error cargando anuncio: '+ads[ai]?.src});ai++;playAd()});
if(bc){bc.onmessage=e=>{const c=e.data||{};if(c.type==='reload')loadConfig();if(c.type==='play'){let v=isAd?av:mv;if(v.src)tryPlay(v);else if(music.length)playMusic(mi)}if(c.type==='pause'){(isAd?av:mv).pause();playing=false;post({playing})}if(c.type==='next'&&!isAd)nextMusic();if(c.type==='adsNow')startAds('manual');if(c.type==='unlock')unlock();if(c.type==='ticker'){tickerText.textContent=c.text||'';ticker.style.display='flex'}if(c.type==='hideTicker')ticker.style.display='none';}}
loadConfig();
</script>
</body>
</html>
